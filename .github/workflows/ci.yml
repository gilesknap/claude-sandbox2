# CI for claude-sandbox.
#
# Lint + format check + the full pytest suite (which also runs the
# bash bwrap_argv spec via test_bwrap_argv_bash.py). The unit tests
# pin the bwrap argv flags, so a regression that strips e.g.
# --unshare-pid from bwrap_argv.sh is caught at PR time without
# needing a runtime bwrap integration job.
#
# Runtime verification is `/verify-sandbox` inside a real Claude
# session — the spec lives at .claude/commands/verify-sandbox.md.

name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --all-extras --dev
      - name: ruff lint
        run: uv run ruff check src/ tests/
      - name: ruff format check
        run: uv run ruff format --check src/ tests/
      - name: pytest
        run: uv run pytest -x
