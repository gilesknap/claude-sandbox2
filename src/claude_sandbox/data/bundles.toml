# Bundles group shipped skills/commands so a user can opt in to a
# curated set in one shot:
#
#   claude-sandbox install-skill --bundle pocock
#   claude-sandbox install-command --bundle pocock
#
# Each bundle may set `skills = [...]` and/or `commands = [...]`.
# Names must match what `claude-sandbox list-skills` /
# `list-commands` would print. An empty bundle is allowed (the CLI
# logs a "no <kind>s in bundle" notice and exits 0) so the schema
# remains useful as a placeholder while content is being assembled.

[bundles.pocock]
# The "Matt Pocock" engineering bundle — TDD-leaning skills the
# previous bash project shipped via a setup-matt-pocock-skills
# meta-installer. Replaced here with bundle resolution so the
# install path doesn't grow a special case.
skills = ["tdd", "diagnose", "grill-with-docs", "improve-codebase-architecture", "triage"]
commands = []

[bundles.minimal]
# Empty placeholder — useful as a smoke test for the empty-bundle
# code path and as a template a user can copy when authoring their
# own bundle.
skills = []
commands = []
